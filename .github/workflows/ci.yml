name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plugin-ci:
    name: Plugin CI
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck and build when available
        run: |
          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const { spawnSync } = require('node:child_process');

          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const checks = ['typecheck', 'build'];

          for (const check of checks) {
            if (!scripts[check]) {
              console.log(`Skipping npm run ${check}: script is not defined.`);
              continue;
            }

            console.log(`Running npm run ${check}...`);
            const result = spawnSync('npm', ['run', check], { stdio: 'inherit' });
            if (result.status !== 0) {
              process.exit(result.status || 1);
            }
          }
          NODE